apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection
  namespace: arkhe-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking
      component: fraud-detection
  template:
    metadata:
      labels:
        app: banking
        component: fraud-detection
    spec:
      containers:
      - name: fraud-detection
        image: python:3.9-slim
        command: ["python3", "/app/banking/fraud_detection.py"]
        volumeMounts:
        - name: app-code
          mountPath: /app
      volumes:
      - name: app-code
        hostPath:
          path: /opt/arkhe
