apiVersion: apps/v1
kind: Deployment
metadata:
  name: trade-finance
  namespace: arkhe-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking
      component: trade-finance
  template:
    metadata:
      labels:
        app: banking
        component: trade-finance
    spec:
      containers:
      - name: trade-finance
        image: python:3.9-slim
        command: ["python3", "/app/banking/trade_finance.py"]
        volumeMounts:
        - name: app-code
          mountPath: /app
      volumes:
      - name: app-code
        hostPath:
          path: /opt/arkhe
