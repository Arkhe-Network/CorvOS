apiVersion: v1
kind: Namespace
metadata:
  name: arkhe
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cathedral-config
  namespace: arkhe
data:
  REDIS_HOST: "akasha-spine"
  REDIS_PORT: "6379"
  COVM_BASELINE_TAU: "0.999"
  LAMBDA_SOC: "0.015"
  ORACLE_MODEL: "llama3.2:3b"
  OLLAMA_URL: "http://ollama.arkhe.svc.cluster.local:11434/api/generate"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: akasha-spine
  namespace: arkhe
spec:
  serviceName: "akasha-spine"
  replicas: 3
  selector:
    matchLabels:
      app: akasha-spine
  template:
    metadata:
      labels:
        app: akasha-spine
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
        ports:
        - containerPort: 6379
        resources:
          limits:
            cpu: "500m"
            memory: "600Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cathedral-nerve-endings
  namespace: arkhe
spec:
  selector:
    matchLabels:
      tier: sensorium
  template:
    metadata:
      labels:
        tier: sensorium
    spec:
      containers:
      - name: geo-collector
        image: arkhe/collectors:onda2
        command: ["python", "geo_collector.py"]
        envFrom:
        - configMapRef:
            name: cathedral-config
        resources:
          limits: { cpu: "100m", memory: "128Mi" }
          requests: { cpu: "50m", memory: "64Mi" }
      - name: soc-collector
        image: arkhe/collectors:onda2
        command: ["python", "soc_collector.py"]
        envFrom:
        - configMapRef:
            name: cathedral-config
        resources:
          limits: { cpu: "100m", memory: "128Mi" }
          requests: { cpu: "50m", memory: "64Mi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuse-engine
  namespace: arkhe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fuse-engine
  template:
    metadata:
      labels:
        app: fuse-engine
    spec:
      containers:
      - name: fuse
        image: arkhe/fuse-engine:onda2
        envFrom:
        - configMapRef:
            name: cathedral-config
        resources:
          limits: { cpu: "500m", memory: "256Mi" }
          requests: { cpu: "200m", memory: "128Mi" }
        volumeMounts:
        - name: akasha-log
          mountPath: /var/log/akasha
      volumes:
      - name: akasha-log
        emptyDir: {}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fuse-engine-hpa
  namespace: arkhe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fuse-engine
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: arkhe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        resources:
          limits: { cpu: "2", memory: "4Gi" }
          requests: { cpu: "1", memory: "2Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: arkhe
spec:
  selector:
    app: ollama
  ports:
  - port: 11434
    targetPort: 11434
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oracle-voice
  namespace: arkhe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oracle-voice
  template:
    metadata:
      labels:
        app: oracle-voice
    spec:
      containers:
      - name: oracle
        image: arkhe/oracle-voice:onda2
        envFrom:
        - configMapRef:
            name: cathedral-config
        resources:
          limits: { cpu: "200m", memory: "128Mi" }
          requests: { cpu: "100m", memory: "64Mi" }
