version: '3.8'
services:
  tct-twin:
    image: arkhe/cathedral:latest
    command: python3 /usr/local/bin/tct_twin_server.py
    ports:
      - "42000:42000"
    networks:
      - cathedral-net
    volumes:
      - covm-run:/var/run
      - akasha-log:/var/log/akasha
    deploy:
      mode: global
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  covm-daemon:
    image: arkhe/cathedral:latest
    command: /usr/local/bin/covm-daemon --socket /var/run/covm.sock --baseline-tau 0.999
    depends_on:
      - tct-twin
    networks:
      - cathedral-net
    volumes:
      - covm-run:/var/run
      - akasha-log:/var/log/akasha
    deploy:
      mode: global
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: '2'
          memory: 4G

networks:
  cathedral-net:
    driver: overlay
    attachable: true

volumes:
  covm-run:
  akasha-log:
    driver: local
    driver_opts:
      type: nfs
      o: addr=akasha-nfs.arkhe.global,nolock,soft,rw
      device: ":/akasha"
